services:
  # ── Keycloak Identity Provider ─────────────────────────────────────────────
  # Uses PostgreSQL (Supabase) as its DB → no disk needed, survives free-tier restarts.
  # --cache=local disables JGroups clustering → saves ~150 MB RAM.
  # Realm + users are auto-imported on first boot via --import-realm.
  - type: web
    name: venuesync-keycloak
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./keycloak/Dockerfile
    dockerContext: ./keycloak
    envVars:
      - key: KEYCLOAK_ADMIN
        value: admin
      - key: KEYCLOAK_ADMIN_PASSWORD
        syncEnv: KEYCLOAK_ADMIN_PASSWORD   # Set this in Render dashboard → keep it secret
      - key: KC_HOSTNAME
        value: https://keycloak-server-3dsx.onrender.com
      - key: KC_HTTP_ENABLED
        value: "true"
      - key: KC_HOSTNAME_STRICT
        value: "false"
      - key: KC_PROXY_HEADERS
        value: xforwarded
      # ── Supabase PostgreSQL for Keycloak data ──────────────────────────────
      - key: KC_DB
        value: postgres
      - key: KC_DB_URL
        syncEnv: KC_DB_URL          # e.g. jdbc:postgresql://<host>:5432/postgres?sslmode=require
      - key: KC_DB_USERNAME
        syncEnv: KC_DB_USERNAME     # your Supabase username
      - key: KC_DB_PASSWORD
        syncEnv: KC_DB_PASSWORD     # your Supabase password


  # ── Backend Spring Boot API ────────────────────────────────────────────────
  - type: web
    name: venuesync-api
    env: java
    plan: free
    region: oregon
    buildCommand: cd backend && mvn clean package -DskipTests
    startCommand: cd backend && java -jar target/venuesync-1.0.0.jar
    envVars:
      - key: JAVA_TOOL_OPTIONS
        value: >-
          -Dserver.port=10000
          -Xms64m
          -Xmx256m
          -Xss256k
          -XX:MaxMetaspaceSize=96m
          -XX:+UseSerialGC
          -XX:+UseContainerSupport
          -XX:+OptimizeStringConcat
          -Djava.security.egd=file:/dev/./urandom
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: APP_TIMEZONE
        value: Asia/Kolkata
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: venuesync-postgres
          property: jdbcConnectionString
      - key: DATABASE_USERNAME
        fromService:
          type: pserv
          name: venuesync-postgres
          property: user
      - key: DATABASE_PASSWORD
        fromService:
          type: pserv
          name: venuesync-postgres
          property: password
      - key: KEYCLOAK_ISSUER_URI
        syncEnv: KEYCLOAK_ISSUER_URI   # e.g. https://venuesync-keycloak.onrender.com/realms/event-ticket-platform
      - key: CORS_ALLOWED_ORIGINS
        syncEnv: CORS_ALLOWED_ORIGINS  # e.g. https://venuesync-web.onrender.com

  # ── Frontend React SPA ─────────────────────────────────────────────────────
  - type: web
    name: venuesync-web
    env: static
    plan: free
    region: oregon
    buildCommand: cd frontend && npm install && npm run build
    staticPublicPath: dist
    buildFilter:
      paths:
        - frontend/**
    envVars:
      - key: VITE_API_BASE_URL
        value: https://venuesync-api.onrender.com  # Change to your backend URL once deployed
      - key: VITE_OIDC_AUTHORITY
        syncEnv: VITE_OIDC_AUTHORITY   # e.g. https://venuesync-keycloak.onrender.com/realms/event-ticket-platform
      - key: VITE_OIDC_CLIENT_ID
        value: event-ticket-platform-app

# ── Database ───────────────────────────────────────────────────────────────
databases:
  - name: venuesync-postgres
    ipAllowList: []  # Allow all IPs (adjust for security if needed)
