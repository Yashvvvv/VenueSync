services:
  # Our PostgreSQL database
  db:
    # Using the latest PostgreSQL image
    image: postgres:latest
    # map container 5432 to host 5433 to avoid collision with any local Postgres on the host
    ports:
      - "${DB_HOST_PORT:-5433}:5432"
    restart: always
    environment:
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-changemeinprod!}
      TZ: ${APP_TIMEZONE:-Asia/Kolkata}
      PGTZ: ${APP_TIMEZONE:-Asia/Kolkata}
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Database management interface
  adminer:
    image: adminer:latest
    restart: always
    ports:
      - "${ADMINER_HOST_PORT:-8888}:8080"

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    ports:
      - "${KEYCLOAK_HOST_PORT:-9090}:8080"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_PROXY_HEADERS: ${KC_PROXY_HEADERS:-xforwarded}
      KC_HOSTNAME: ${KEYCLOAK_PUBLIC_BASE_URL:-http://localhost:9090}
      KC_HTTP_ENABLED: ${KC_HTTP_ENABLED:-true}
      KC_HOSTNAME_STRICT: ${KC_HOSTNAME_STRICT:-true}
      KC_HOSTNAME_STRICT_HTTPS: ${KC_HOSTNAME_STRICT_HTTPS:-false}
    volumes:
      - keycloak-data:/opt/keycloak/data
    command:
      - start
      - --db=dev-file
      - --http-enabled=true
      - --proxy-headers=${KC_PROXY_HEADERS:-xforwarded}
      - --hostname=${KEYCLOAK_PUBLIC_BASE_URL:-http://localhost:9090}
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # VenueSync Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_HOST_PORT:-80}:8080"
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DATABASE_URL: ${DATABASE_URL:-jdbc:postgresql://db:5432/postgres}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-changemeinprod!}
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI:-http://localhost:9090/realms/event-ticket-platform}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,https://venuesync.pages.dev,https://aeea1436.venuesync.pages.dev}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Kolkata}

volumes:
  keycloak-data:
    driver: local
  postgres-data:
    driver: local
