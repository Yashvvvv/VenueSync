# Production Profile
spring.profiles.active=prod

# Database - provided via environment variables
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=2

# JPA - validate schema, never auto-create in prod
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Keycloak
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI}

# CORS - restrict to deployed frontend domain
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Logging - production level
logging.level.org.springframework.web=WARN
logging.level.com.fullstack.venuesync=INFO
logging.level.org.springframework.security=WARN

# Actuator - limit exposure in prod
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
