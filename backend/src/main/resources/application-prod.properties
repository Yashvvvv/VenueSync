# Production Profile

# Database - provided via environment variables
# Render provides jdbcConnectionString (jdbc:postgresql://...) with SSL
spring.datasource.url=${DATABASE_URL:${SPRING_DATASOURCE_URL}}
spring.datasource.username=${DATABASE_USERNAME:${SPRING_DATASOURCE_USERNAME}}
spring.datasource.password=${DATABASE_PASSWORD:${SPRING_DATASOURCE_PASSWORD}}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
# Force SSL for Render PostgreSQL
spring.datasource.hikari.data-source-properties.sslmode=require

# JPA - validate schema, never auto-create in prod
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:${SPRING_JPA_HIBERNATE_DDL_AUTO:update}}
spring.jpa.show-sql=false

# Keycloak
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI}

# CORS - restrict to deployed frontend domain
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Logging - production level
logging.level.org.springframework.web=WARN
logging.level.com.fullstack.venuesync=INFO
logging.level.org.springframework.security=WARN

# Actuator - limit exposure in prod
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
