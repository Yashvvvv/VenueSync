spring.application.name=venuesync

# Active profile (override via SPRING_PROFILES_ACTIVE env var)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Application Timezone - IMPORTANT for wall-clock time approach
# Set this to match the timezone where events are happening
# This ensures LocalDateTime.now() returns the correct local time
app.timezone=${APP_TIMEZONE:Asia/Kolkata}

# Database Connection
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5433/postgres}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:changemeinprod!}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Keycloak / OAuth2
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:9090/realms/event-ticket-platform}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Jackson serialization - serialize LocalDateTime without timezone conversion
# This treats all times as "wall clock" times (event at 2pm shows as 2pm everywhere)
spring.jackson.serialization.write-dates-as-timestamps=false

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Request logging
logging.level.org.springframework.web=INFO
logging.level.com.fullstack.venuesync=INFO

# Server
server.port=${PORT:8080}
